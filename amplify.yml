version: 1
frontend:
  phases:
    preBuild:
      commands:
        - ls -la
        - cd frontend && rm -rf node_modules package-lock.json
        - cd frontend && npm install --legacy-peer-deps
    build:
      commands:
        - cd frontend && npm run build
  artifacts:
    baseDirectory: frontend/.next
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*